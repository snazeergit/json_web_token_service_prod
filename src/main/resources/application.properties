# src/main/resources/application.properties
spring.application.name=jwt-auth-service
server.port=8080

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/jwt_schema
spring.datasource.username=root
spring.datasource.password=VMware1!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=jwt_schema
jwt.secret=myVeryLongSecretKeyForJwtAuthentication123456789

#Refresh token and Access token expiry configuration.
#15 min=15x60sec=900sec=900x1000ms=900 000 milliseconds
jwt.access-token-expiry=900000
#7 days==7x24x60x60sec=604800 sec=604800 000 milliseconds
jwt.refresh-token-expiry=604800000
springdoc.swagger-ui.path=/swagger-ui.html

